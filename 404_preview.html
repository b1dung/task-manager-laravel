
<style>
*{box-sizing:border-box;margin:0;padding:0}
.root{
  min-height:520px;
  background:linear-gradient(160deg,#fff 0%,#edf2f9 50%,#e0e8f5 100%);
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  font-family:'Be Vietnam Pro',sans-serif;
  position:relative;overflow:hidden;border-radius:16px;
}
.blob1{position:absolute;top:-80px;right:-80px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(79,142,247,.12) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;}
.blob2{position:absolute;bottom:-60px;left:-60px;width:260px;height:260px;
  background:radial-gradient(circle,rgba(155,109,232,.10) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;}
.card{
  position:relative;z-index:1;
  background:rgba(255,255,255,.76);
  border:1px solid rgba(255,255,255,.9);
  border-radius:28px;
  box-shadow:0 8px 32px rgba(79,142,247,.10),0 2px 8px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9);
  padding:44px 44px 40px;max-width:480px;width:100%;text-align:center;
  animation:cardIn .65s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(79,142,247,.09);border:1px solid rgba(79,142,247,.20);
  border-radius:99px;padding:4px 14px;
  font-size:12px;color:#4f8ef7;font-family:'Courier New',monospace;font-weight:700;
  margin-bottom:18px;animation:fadeUp .5s ease .1s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.dot{width:6px;height:6px;background:#4f8ef7;border-radius:50%;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.num{
  font-size:clamp(76px,16vw,110px);font-weight:900;line-height:1;letter-spacing:-3px;
  background:linear-gradient(135deg,#4f8ef7 0%,#9b6de8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:2px;animation:numPop .8s cubic-bezier(.34,1.56,.64,1) .15s both;
  display:inline-block;position:relative;overflow:hidden;
}
@keyframes numPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.num::after{
  content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
  animation:shimmer 3.2s ease 1.5s infinite;
}
@keyframes shimmer{0%{left:-120%;opacity:0}40%{opacity:1}100%{left:160%;opacity:0}}
.illo{margin:6px auto 18px;max-width:220px;animation:float 4s ease-in-out .5s infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.divider{width:52px;height:3px;background:linear-gradient(90deg,#4f8ef7,#9b6de8);
  border-radius:99px;margin:0 auto 16px;animation:fadeUp .5s ease .35s both;}
h1{font-size:20px;font-weight:700;color:#1a2440;margin:0 0 9px;letter-spacing:-.3px;animation:fadeUp .5s ease .4s both;}
p{font-size:14px;color:#5a6a8a;line-height:1.65;margin:0 0 28px;animation:fadeUp .5s ease .48s both;}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;animation:fadeUp .5s ease .55s both;}
.btn-primary{
  background:linear-gradient(135deg,#4f8ef7 0%,#9b6de8 100%);color:#fff;
  border:none;height:42px;padding:0 22px;font-size:14px;font-weight:600;
  font-family:'Be Vietnam Pro',sans-serif;border-radius:10px;cursor:pointer;
  box-shadow:0 4px 16px rgba(79,142,247,.35);
  transition:transform .15s ease,box-shadow .15s ease;display:inline-flex;align-items:center;gap:7px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,142,247,.45);}
.btn-outline{
  background:transparent;color:#4f8ef7;border:1.5px solid #4f8ef7;
  height:42px;padding:0 20px;font-size:14px;font-weight:600;
  font-family:'Be Vietnam Pro',sans-serif;border-radius:10px;cursor:pointer;
  transition:transform .15s ease,background .15s ease;display:inline-flex;align-items:center;gap:7px;
}
.btn-outline:hover{background:rgba(79,142,247,.07);transform:translateY(-2px);}
</style>

<div class="root">
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="card">
    <div class="badge"><span class="dot"></span>HTTP 404 · Not Found</div>
    <div class="num">404</div>

        <line x1="122" y1="188" x2="198" y2="188" stroke="#9b6de8" stroke-width="1" opacity=".3"/>

        <circle cx="137" cy="108" r="3" fill="#4f8ef7" filter="url(#gw)"/>

        <path d="M 185 100 Q 192 105 185 109 Q 178 113 185 117" fill="none" stroke="#9b6de8" stroke-width="2" stroke-linecap="round" filter="url(#gw)"/>

        <path d="M 138 126 Q 144 122 150 126 Q 156 130 162 126 Q 168 122 174 126" fill="none" stroke="#94a8cc" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Legs -->
        <rect x="115" y="232" width="28" height="18" rx="7" fill="#b0c4de"/>
        <rect x="177" y="232" width="28" height="18" rx="7" fill="#b0c4de"/>
        <rect x="110" y="246" width="36" height="10" rx="5" fill="#94a8cc"/>
        <rect x="174" y="246" width="36" height="10" rx="5" fill="#94a8cc"/>
        <!-- Arms -->
        <rect x="68" y="150" width="36" height="16" rx="8" fill="url(#bG)" transform="rotate(-18 86 158)"/>

        <rect x="216" y="150" width="36" height="16" rx="8" fill="url(#bG)" transform="rotate(14 234 158)"/>

        <!-- Question marks -->
        <text x="42" y="116" font-family="Georgia,serif" font-size="22" fill="#9b6de8" opacity=".7" font-weight="bold" filter="url(#gw)">?</text>
        <text x="268" y="102" font-family="Georgia,serif" font-size="18" fill="#4f8ef7" opacity=".65" font-weight="bold" filter="url(#gw)">?</text>
        <text x="56" y="72" font-family="Georgia,serif" font-size="12" fill="#9b6de8" opacity=".45" font-weight="bold">?</text>
        <!-- Sign post -->
        <line x1="285" y1="180" x2="285" y2="248" stroke="#94a8cc" stroke-width="3" stroke-linecap="round"/>
        <rect x="262" y="183" width="48" height="20" rx="4" fill="#4f8ef7" opacity=".85"/>
        <text x="286" y="197" text-anchor="middle" font-family="monospace" font-size="8.5" fill="white" font-weight="bold">DASHBOARD</text>
        <rect x="258" y="208" width="52" height="20" rx="4" fill="#e85d8a" opacity=".75" transform="rotate(-7 284 218)"/>
        <text x="284" y="222" text-anchor="middle" font-family="monospace" font-size="8.5" fill="white" font-weight="bold" transform="rotate(-7 284 222)">???</text>
        <!-- Sparkles -->
        <circle cx="92" cy="142" r="2" fill="#4f8ef7" opacity=".55"/>

      </svg>
    </div>

    <div class="divider"></div>
    <h1>Trang không tồn tại</h1>
    <p>Đường dẫn bạn truy cập không tồn tại hoặc đã bị xóa.<br>Hãy quay lại trang chủ hoặc kiểm tra lại đường dẫn.</p>

    <div class="actions">
      <button class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

</div>
