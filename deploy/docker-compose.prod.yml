# Phase 12 — production stack for the Laravel + React app.
# Build React first:  cd frontend && VITE_API_URL=/api/v1 npm ci && npm run build
# Then:  docker compose -f deploy/docker-compose.prod.yml --env-file backend/.env up -d
services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-taskboard}
      MYSQL_USER: ${DB_USERNAME:-taskboard}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD}
    volumes: [taskboard_mysql:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [taskboard_redis:/data]

  app: &app
    build: { context: ../backend, dockerfile: Dockerfile }
    image: taskboard-laravel:prod
    restart: unless-stopped
    env_file: ../backend/.env
    volumes: [taskboard_storage:/var/www/html/storage]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }

  # Run migrations once on deploy, then exit.
  migrate:
    <<: *app
    restart: "no"
    command: ["php", "artisan", "migrate", "--force"]
    depends_on:
      mysql: { condition: service_healthy }

  queue:
    <<: *app
    command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600"]

  scheduler:
    <<: *app
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]

  reverb:
    <<: *app
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports: ["8080:8080"]

  # Apache serves the React build + reverse-proxies the PHP-FPM app and Reverb WS.
  web:
    image: httpd:2.4
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ../frontend/dist:/var/www/html:ro
      - ./apache-taskboard.conf:/usr/local/apache2/conf/extra/taskboard.conf:ro
      - taskboard_storage:/var/www/storage:ro
    depends_on: [app, reverb]

volumes:
  taskboard_mysql:
  taskboard_redis:
  taskboard_storage:
