# Phase 12 — Apache vhost: serve React build + proxy Laravel API + Reverb WS.
# Needs: mod_proxy mod_proxy_fcgi mod_proxy_http mod_proxy_wstunnel mod_rewrite mod_ssl mod_headers
# (Docker httpd: a2enmod equivalents already bundled; uncomment LoadModule if vanilla.)

ServerName app.example.com

<VirtualHost *:80>
    ServerName app.example.com
    Redirect permanent / https://app.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName app.example.com
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/app.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/app.example.com/privkey.pem

    LimitRequestBody 262144000   # 250 MB (attachment limit)

    # PHP-FPM (Laravel) — /api/* and /broadcasting/* go to the app container :9000
    <LocationMatch "^/(api|broadcasting|up)">
        ProxyFCGISetEnvIf "true" SCRIPT_FILENAME "/var/www/html/public/index.php"
        ProxyPass "fcgi://app:9000/var/www/html/public/index.php"
    </LocationMatch>

    # Reverb websocket
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/app/(.*)$ ws://reverb:8080/app/$1 [P,L]
    ProxyPass /app/ http://reverb:8080/app/
    ProxyPassReverse /app/ http://reverb:8080/app/

    # Laravel-served uploads (avatars/attachments via storage:link symlink)
    Alias /uploads /var/www/storage/app/public
    <Directory /var/www/storage/app/public>
        Require all granted
    </Directory>

    # React SPA fallback
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>
</VirtualHost>
