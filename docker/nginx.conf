# Single entrypoint for the full stack: serve the React build, reverse-proxy the
# Laravel API to php-fpm, and the Reverb websocket. Browse at http://localhost:8080
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;       # React build (frontend/dist)
    index index.html;
    client_max_body_size 256M;        # 250 MB attachment uploads

    # Laravel routes (API + /uploads file routes + /api/v1/broadcasting/auth) → php-fpm
    location ~ ^/(api|uploads) {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_read_timeout 300;
    }

    # Reverb websocket (Pusher protocol path /app/{key})
    location /app {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
